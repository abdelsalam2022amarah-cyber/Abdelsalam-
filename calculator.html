<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حاسبة النتيجة</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="logo">

<img src="images/logo.png">

</div>

<h1 id="pageTitle"></h1>

<table id="resultTable">

<thead>

<tr>

<th>المادة</th>

<th>الأعمال</th>

<th>الامتحان</th>

<th>المجموع</th>

<th>النسبة</th>

<th>التقدير</th>

<th>النتيجة</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<div class="summary">
<div class="summary-card">

<h2>النتيجة النهائية</h2>

<div class="summary-item">
<span>المجموع الكلي</span>
<strong id="grandTotal">0 / 0</strong>
</div>

<div class="summary-item">
<span>النسبة المئوية</span>
<strong id="percentage">0%</strong>
</div>

<div class="summary-item">
<span>التقدير العام</span>
<strong id="grade">-</strong>
</div>

<div class="summary-item">
<span>النتيجة النهائية</span>
<strong id="finalResult">-</strong>
</div>

<button id="clearBtn" class="clear-btn">
🗑️ مسح البيانات

</div>
<script src="script.js"></script>
</body>

</html>
